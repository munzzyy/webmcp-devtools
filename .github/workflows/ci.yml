name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      - run: node --test

  # Everything here has to read like a person wrote it - comments and docs included.
  # noslop's code mode scores each source file for machine-writing tells and fails
  # at 10/100 lines. Pinned so a rules update in noslop can't redden CI on its own.
  noslop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
      - run: pip install noslop-lint==0.10.0
      - run: git ls-files -z '*.js' '*.html' '*.yml' '*.md' | xargs -0r noslop --no-config
